[env:esp32-c3-supermini]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino

; Velocità monitor seriale
monitor_speed = 115200
; Velocità upload spinta al massimo
upload_speed = 921600

; --- FLAG CRITICI PER C3 SUPERMINI ---
build_flags = 
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1

; --- LIBRERIE ---
lib_deps =
    ; Usiamo U8g2 per il display (come nel progetto funzionante)
    olikraus/U8g2 @ ^2.35.9
    ; Manteniamo FastLED 3.6.0 per gli anelli (evita l'errore di prima)
    fastled/FastLED @ 3.6.0